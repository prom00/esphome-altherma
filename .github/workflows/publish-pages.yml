name: Publish Pages

on:
  push:
    branches:
      - main
    paths:
      - 'static/**'
      - '.github/workflows/publish-pages.yml'
  workflow_run:
    workflows:
      - Publish Firmware
    types:
      - completed
  pull_request:
    paths:
      - 'static/**'
      - '.github/workflows/publish-pages.yml'


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - run: mkdir -p output/firmware

      - name: Build
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./static
          destination: ./output

      - name: Fetch firmware files
        uses: robinraju/release-downloader@v1
        with:
          latest: true
          fileName: '*'
          out-file-path: output/firmware

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: output
          retention-days: 1
          
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build pages for  Cloudflare Pages
        run: bundle exec jekyll build --source ./static --destination ./output --baseurl ""
    
      - name: Publish to Cloudflare Pages
        if: github.event_name != 'pull_request'
        run: npx wrangler pages deploy output --project-name esphome-altherma
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}      

  publish:
    if: github.event_name != 'pull_request'
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
