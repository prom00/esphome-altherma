# Mapping for ERLA D EBSH-X 16P30-50 D series 11-16kW-ECH2O systems.
# Verified against the user's support/registers + support/sensors export and
# cross-checked with the upstream ESPAltherma model definition that best matches
# EBSXB16P50DF:
# https://github.com/raomin/ESPAltherma/blob/main/include/def/Altherma(ERLA%20D%20EBSH-X%2016P30-50%20D%20SERIES%2011-16kW-ECH2O).h

# anchors
.altherma_base: &altherma_base
  platform: altherma_hub
  altherma_hub_id: altherma_hub_1

.temp: &temp
  <<: *altherma_base
  device_class: temperature
  unit_of_measurement: °C
  state_class: measurement
  accuracy_decimals: 1

.binary: &binary
  <<: *altherma_base

.pressure: &pressure
  <<: *altherma_base
  device_class: pressure
  unit_of_measurement: bar
  state_class: measurement
  accuracy_decimals: 1

.text: &text
  <<: *altherma_base

sensor:
  - <<: *temp
    name: Outdoor air temp.
    register: 0x20
    offset: 0
    convid: 105
    datasize: 2
  - <<: *temp
    name: Leaving water temp. before BUH (R1T)
    register: 0x61
    offset: 2
    convid: 105
    datasize: 2
  - <<: *temp
    name: Outlet Water BUH Temp. (R2T)
    register: 0x61
    offset: 4
    convid: 105
    datasize: 2
  - <<: *temp
    name: Refrig. Temp. liquid side (R3T)
    register: 0x61
    offset: 6
    convid: 105
    datasize: 2
  - <<: *temp
    name: Inlet water temp.(R4T)
    register: 0x61
    offset: 8
    convid: 105
    datasize: 2
  - <<: *temp
    name: DHW tank temp. (R5T)
    register: 0x61
    offset: 10
    convid: 105
    datasize: 2
  - <<: *altherma_base
    name: Flow sensor (l⁄min)
    register: 0x62
    offset: 9
    convid: 105
    datasize: 2
    unit_of_measurement: l/min
    state_class: measurement
    accuracy_decimals: 1
  - <<: *pressure
    name: Water pressure
    register: 0x62
    offset: 11
    convid: 105
    datasize: 1

binary_sensor:
  - <<: *binary
    name: Defrost Operation
    register: 0x10
    offset: 1
    convid: 304
    datasize: 1

text_sensor:
  - <<: *text
    name: Operation Mode
    icon: mdi:heat-pump
    register: 0x10
    offset: 0
    convid: 217
    datasize: 1
  - <<: *text
    name: I⁄U operation mode
    icon: mdi:heat-pump
    register: 0x60
    offset: 2
    convid: 315
    datasize: 1
