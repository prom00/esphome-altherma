# Mapping for Daikin Altherma LT CA/CB EHVH-CB / EHVX-CB 11-16kW systems.
# Use this as: packages: !include confs/altherma_ehvh_ehvx_cb.yaml

.altherma_base: &altherma_base
  platform: altherma_hub
  altherma_hub_id: altherma_hub_1

.temp: &temp
  <<: *altherma_base
  device_class: temperature
  unit_of_measurement: °C
  state_class: measurement
  accuracy_decimals: 1

.pressure: &pressure
  <<: *altherma_base
  device_class: pressure
  unit_of_measurement: bar
  state_class: measurement
  accuracy_decimals: 1

.current: &current
  <<: *altherma_base
  device_class: current
  unit_of_measurement: A
  state_class: measurement
  accuracy_decimals: 1

.voltage: &voltage
  <<: *altherma_base
  device_class: voltage
  unit_of_measurement: V
  state_class: measurement
  accuracy_decimals: 0

.number: &number
  <<: *altherma_base
  state_class: measurement
  accuracy_decimals: 1

.binary: &binary
  <<: *altherma_base

.text: &text
  <<: *altherma_base

sensor:
  # Outdoor unit info
  - <<: *number
    name: Sensor Data Qty
    register: 0x00
    offset: 0
    convid: 152
    datasize: 1
    accuracy_decimals: 0
  - <<: *number
    name: INV compressor Qty
    register: 0x00
    offset: 1
    convid: 152
    datasize: 1
    accuracy_decimals: 0
  - <<: *number
    name: STD compressor Qty
    register: 0x00
    offset: 2
    convid: 152
    datasize: 1
    accuracy_decimals: 0
  - <<: *number
    name: Fan Data Qty
    register: 0x00
    offset: 3
    convid: 152
    datasize: 1
    accuracy_decimals: 0
  - <<: *number
    name: Expansion Valve Data Qty
    register: 0x00
    offset: 4
    convid: 152
    datasize: 1
    accuracy_decimals: 0
  - <<: *number
    name: 4 Way Valve Data Qty
    register: 0x00
    offset: 5
    convid: 152
    datasize: 1
    accuracy_decimals: 0
  - <<: *number
    name: Crank Case Heater Qty
    register: 0x00
    offset: 6
    convid: 152
    datasize: 1
    accuracy_decimals: 0
  - <<: *number
    name: Solenoid valve Qty
    register: 0x00
    offset: 7
    convid: 152
    datasize: 1
    accuracy_decimals: 0
  - <<: *number
    name: Max. connectable indoor units
    register: 0x00
    offset: 8
    convid: 152
    datasize: 1
    accuracy_decimals: 0
  - <<: *number
    name: Connected Indoor Unit Qty
    register: 0x00
    offset: 9
    convid: 152
    datasize: 1
    accuracy_decimals: 0
  - <<: *number
    name: O/U MPU ID (xx)
    register: 0x00
    offset: 10
    convid: 152
    datasize: 1
    accuracy_decimals: 0
  - <<: *number
    name: O/U MPU ID (yy)
    register: 0x00
    offset: 11
    convid: 152
    datasize: 1
    accuracy_decimals: 0
  - <<: *number
    name: O/U capacity
    register: 0x00
    offset: 12
    convid: 105
    datasize: 1
    unit_of_measurement: kW
    accuracy_decimals: 1

  # Outdoor control temperatures
  - <<: *temp
    name: Target Evap. Temp.
    register: 0x10
    offset: 6
    convid: 114
    datasize: 2
  - <<: *temp
    name: Target Cond. Temp.
    register: 0x10
    offset: 8
    convid: 114
    datasize: 2

  # Outdoor temperatures and pressure
  - <<: *temp
    name: Outdoor air temp. (R1T)
    register: 0x20
    offset: 0
    convid: 105
    datasize: 2
  - <<: *temp
    name: O/U Heat Exch. Temp.
    register: 0x20
    offset: 2
    convid: 105
    datasize: 2
  - <<: *temp
    name: Discharge pipe temp.
    register: 0x20
    offset: 4
    convid: 105
    datasize: 2
  - <<: *temp
    name: Suction pipe temp.
    register: 0x20
    offset: 6
    convid: 105
    datasize: 2
  - <<: *temp
    name: Heat exchanger mid-temp.
    register: 0x20
    offset: 8
    convid: 105
    datasize: 2
  - <<: *temp
    name: Liquid pipe temp. (R6T)
    register: 0x20
    offset: 10
    convid: 105
    datasize: 2
  - <<: *temp
    name: Heat sink temp.
    register: 0x20
    offset: 12
    convid: 105
    datasize: 2
  - <<: *pressure
    name: Pressure sensor
    register: 0x20
    offset: 14
    convid: 105
    datasize: 2

  # Outdoor electrical and refrigerant/brine values
  - <<: *current
    name: INV primary current
    register: 0x21
    offset: 0
    convid: 105
    datasize: 2
  - <<: *current
    name: INV secondary current
    register: 0x21
    offset: 2
    convid: 105
    datasize: 2
  - <<: *voltage
    name: Voltage N-phase
    register: 0x21
    offset: 4
    convid: 101
    datasize: 2
  - <<: *temp
    name: Brine inlet temp.
    register: 0x21
    offset: 7
    convid: 105
    datasize: 2
  - <<: *temp
    name: Brine outlet temp.
    register: 0x21
    offset: 9
    convid: 105
    datasize: 2
  - <<: *temp
    name: Refrig. temp. evap. In
    register: 0x21
    offset: 11
    convid: 105
    datasize: 2
  - <<: *temp
    name: Refrig. temp. evap. Out
    register: 0x21
    offset: 13
    convid: 105
    datasize: 2

  # Outdoor inverter, fan and valve values - 11-16kW CB layout
  - <<: *number
    name: INV frequency
    register: 0x30
    offset: 0
    convid: 152
    datasize: 1
    unit_of_measurement: rps
    accuracy_decimals: 0
  - <<: *number
    name: Fan 1
    register: 0x30
    offset: 1
    convid: 211
    datasize: 1
    unit_of_measurement: step
    accuracy_decimals: 0
  - <<: *number
    name: Fan 2
    register: 0x30
    offset: 2
    convid: 211
    datasize: 1
    unit_of_measurement: step
    accuracy_decimals: 0
  - <<: *number
    name: Expansion valve 1
    register: 0x30
    offset: 3
    convid: 151
    datasize: 2
    unit_of_measurement: pls
    accuracy_decimals: 0
  - <<: *number
    name: Expansion valve 2
    register: 0x30
    offset: 5
    convid: 151
    datasize: 2
    unit_of_measurement: pls
    accuracy_decimals: 0

  # Indoor unit status/info
  - <<: *number
    name: Indoor Unit Address
    register: 0x60
    offset: 1
    convid: 152
    datasize: 1
    accuracy_decimals: 0
  - <<: *number
    name: Error detailed code
    register: 0x60
    offset: 4
    convid: 314
    datasize: 2
    accuracy_decimals: 0
  - <<: *number
    name: I/U capacity code
    register: 0x60
    offset: 6
    convid: 219
    datasize: 1
    accuracy_decimals: 0
  - <<: *temp
    name: DHW setpoint
    register: 0x60
    offset: 7
    convid: 105
    datasize: 2
  - <<: *temp
    name: LW setpoint main
    register: 0x60
    offset: 9
    convid: 105
    datasize: 2
  - <<: *number
    name: Indoor Option Code
    register: 0x60
    offset: 13
    convid: 152
    datasize: 1
    accuracy_decimals: 0
  - <<: *number
    name: I/U EEPROM Ver.
    register: 0x60
    offset: 16
    convid: 152
    datasize: 1
    accuracy_decimals: 0

  # Indoor temperatures
  - <<: *temp
    name: Leaving water temp. before BUH (R1T)
    register: 0x61
    offset: 2
    convid: 105
    datasize: 2
  - <<: *temp
    name: Leaving water temp. after BUH (R2T)
    register: 0x61
    offset: 4
    convid: 105
    datasize: 2
  - <<: *temp
    name: Refrig. Temp. liquid side (R3T)
    register: 0x61
    offset: 6
    convid: 105
    datasize: 2
  - <<: *temp
    name: Inlet water temp. (R4T)
    register: 0x61
    offset: 8
    convid: 105
    datasize: 2
  - <<: *temp
    name: DHW tank temp. (R5T)
    register: 0x61
    offset: 10
    convid: 105
    datasize: 2
  - <<: *temp
    name: Indoor ambient temp. (R1T)
    register: 0x61
    offset: 12
    convid: 105
    datasize: 2
  - <<: *temp
    name: Ext. indoor ambient sensor (R6T)
    register: 0x61
    offset: 14
    convid: 105
    datasize: 2

  # Indoor setpoints, flow and pump
  - <<: *temp
    name: LW setpoint add
    register: 0x62
    offset: 3
    convid: 105
    datasize: 2
  - <<: *temp
    name: RT setpoint
    register: 0x62
    offset: 5
    convid: 105
    datasize: 2
  - <<: *number
    name: Flow sensor
    register: 0x62
    offset: 9
    convid: 105
    datasize: 2
    unit_of_measurement: l/min
    accuracy_decimals: 1
  - <<: *pressure
    name: Water pressure
    register: 0x62
    offset: 11
    convid: 105
    datasize: 1
  - <<: *number
    name: Water pump signal
    register: 0x62
    offset: 12
    convid: 152
    datasize: 1
    unit_of_measurement: "%"
    accuracy_decimals: 0
  - <<: *number
    name: 3 way Valve Mixing 1
    register: 0x62
    offset: 13
    convid: 152
    datasize: 1
    accuracy_decimals: 0
  - <<: *number
    name: 3 way Valve Mixing 2
    register: 0x62
    offset: 14
    convid: 152
    datasize: 1
    accuracy_decimals: 0

  # Hybrid/extra block present in CB def; harmless if unsupported/0
  - <<: *number
    name: BE COP
    register: 0x64
    offset: 3
    convid: 105
    datasize: 2
    accuracy_decimals: 1
  - <<: *temp
    name: Hybrid Heating Target Temp.
    register: 0x64
    offset: 5
    convid: 105
    datasize: 2
  - <<: *temp
    name: Boiler Heating Target Temp.
    register: 0x64
    offset: 7
    convid: 105
    datasize: 2
  - <<: *temp
    name: Mixed water temp. (R7T)
    register: 0x64
    offset: 10
    convid: 118
    datasize: 2

